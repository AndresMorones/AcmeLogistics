app = "acme-dashboard-andres-morones"
# iad colocated with HR Twin (us-east) — minimizes Twin round-trip latency.
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  # Always-warm: demo path can't tolerate cold-start; mirrors API posture.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    # /api/health bypasses signed-link middleware so Fly checker can hit it unauthenticated.
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
