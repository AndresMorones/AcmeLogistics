app = "robot-api-andres-morones"
# iad co-locates with HR platform (US-East), cutting webhook round-trip latency.
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "api/Dockerfile"

[env]
  LOADS_CSV_PATH = "/app/loads.csv"
  HR_BASE_URL = "https://platform.happyrobot.ai/api/v2"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  # Always-warm: HR webhooks can't tolerate cold-start latency, so we trade idle
  # cost for sub-second response guarantees.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  # I/O-bound workload (HR Twin + FMCSA HTTP fan-out); CPU/memory upgrades don't
  # move the needle — verified empirically.
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
